name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python 3.10, CPU)
    runs-on: ubuntu-latest

    env:
      SDL_VIDEODRIVER: dummy
      SDL_AUDIODRIVER: dummy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}-torch-cpu
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install CPU PyTorch and torchvision
        run: |
          pip install --upgrade pip
          pip install torch==2.5.1+cpu torchvision==0.20.1+cpu \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest cuas/tests/ -v
